  <script>
    function loadResult() {
      const data = JSON.parse(localStorage.getItem("lastPrediction"));
      const city = localStorage.getItem("selectedCity") || "Your City";

      document.getElementById("city").textContent = city;

      if (!data) {
        document.getElementById("decision").textContent = "—";
        document.getElementById("confidence").textContent = "—";
        document.getElementById("reasons-heading").textContent = "No result data found.";
        document.getElementById("reasons").innerHTML = "";
        return;
      }

      console.log("Loaded prediction data:", data);

      const decision =
        data.decision ||
        data.result ||
        data.recommendation ||
        (data.prediction ? String(data.prediction).toUpperCase() : "UNKNOWN");

      const confidenceValue =
        data.confidence ??
        data.score ??
        data.probability ??
        0;

      const reasons =
        data.reasons ||
        data.key_factors ||
        data.explanations ||
        [];

      const decisionEl = document.getElementById("decision");
      decisionEl.textContent = decision;

      if (decision === "YES") {
        decisionEl.className = "badge tag-yes";
        document.getElementById("reasons-heading").textContent = "Reasons for YES:";
      } else if (decision === "NO") {
        decisionEl.className = "badge tag-no";
        document.getElementById("reasons-heading").textContent = "Reasons for NO:";
      } else {
        decisionEl.className = "badge";
        document.getElementById("reasons-heading").textContent = "Key Factors:";
      }

      let confidenceText = "—";
      if (typeof confidenceValue === "number") {
        confidenceText = confidenceValue <= 1
          ? Math.round(confidenceValue * 100) + "%"
          : Math.round(confidenceValue) + "%";
      }
      document.getElementById("confidence").textContent = confidenceText;

      if (Array.isArray(reasons) && reasons.length > 0) {
        document.getElementById("reasons").innerHTML = reasons
          .map(reason => `<span class="badge">${reason}</span>`)
          .join(" ");
      } else {
        document.getElementById("reasons").innerHTML =
          `<span class="badge">No reasons provided</span>`;
      }
    }

    window.addEventListener("DOMContentLoaded", loadResult);
  </script>
