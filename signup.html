<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign Up - SmartDCAI</title>
  <link rel="stylesheet" href="indexstyle.css">
  <link rel="stylesheet" href="Citiesstyle.css">
  <style>
    body { background-color: #0f2e21; color: white; }
    .auth-container {
      max-width: 400px; margin: 100px auto; padding: 40px;
      background: #1a4a3a; border: 1px solid #3ea174; border-radius: 20px;
      text-align: center;
    }
    input {
      width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
      border: 1px solid #3ea174; background: #0f2e21; color: white;
    }
    .error-msg {
      color: #ff6b6b;
      font-size: 14px;
      margin: 8px 0 0 0;
      min-height: 20px;
    }
    .success-msg {
      color: #3ea174;
      font-size: 14px;
      margin: 8px 0 0 0;
      min-height: 20px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html">Siting</a>
      <div class="navlinks">
        <a href="index.html">Home</a>
        <a href="cities.html">Cities</a>
        <a href="guide.html">Data Guide</a>
        <a href="result.html">Result</a>
        <a href="about.html">About</a>
        <a href="login.html">Login</a>
        <a class="active" href="signup.html">Signup</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="auth-container">
      <h2>Create Account</h2>
      <p class="muted">Join the AI-Driven Siting Platform</p>

      <input type="email" id="reg-email" placeholder="Email Address">
      <input type="password" id="reg-pass" placeholder="Password">

      <p id="error-msg" class="error-msg"></p>

      <button id="signup-btn" class="btn primary" style="width:100%;" onclick="handleSignup()">Sign Up</button>

      <p class="muted" style="margin-top: 20px;">
        Already have an account? <a href="login.html" style="color: #3ea174;">Login</a>
      </p>
    </div>
  </main>

  <script>
    const API_BASE = "https://dcai-backend.onrender.com";

    async function handleSignup() {
      const email    = document.getElementById("reg-email").value.trim();
      const password = document.getElementById("reg-pass").value;
      const errorEl  = document.getElementById("error-msg");
      const btn      = document.getElementById("signup-btn");

      // Clear previous error
      errorEl.textContent = "";

      // Basic validation
      if (!email || !password) {
        errorEl.textContent = "Please fill in all fields.";
        return;
      }
      if (password.length < 6) {
        errorEl.textContent = "Password must be at least 6 characters.";
        return;
      }

      // Loading state
      btn.disabled    = true;
      btn.textContent = "Creating account...";

      try {
        const response = await fetch(`${API_BASE}/auth/signup`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Success — redirect to login
          window.location.href = "login.html";
        } else {
          // Show exact error from backend (e.g. "Email already registered")
          errorEl.textContent = data.detail || "Error creating account. Please try again.";
        }

      } catch (err) {
        errorEl.textContent = "Could not connect to server. Please try again.";
      } finally {
        btn.disabled    = false;
        btn.textContent = "Sign Up";
      }
    }
  </script>

</body>
</html>
